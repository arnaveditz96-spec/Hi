name: Unzip Project

on:
  push:
    branches:
      - main

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Show Files
        run: ls

      - name: Unzip Project
        run: unzip ExamGuessAI_GitHubAPK.zip -d extracted

      - name: Show Extracted Files
        run: ls extracted
