name: Unzip Project

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: List Files
        run: ls

      - name: Unzip File
        run: unzip ExamGuessAI_GitHubAPK.zip -d extracted

      - name: Show Extracted Files
        run: ls extracted
